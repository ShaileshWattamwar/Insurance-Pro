server:
  port: 8083

spring:
  application:
    name: DOCUMENT-SERVICE

  data:
    mongodb:
      uri: mongodb://localhost:27017/ClaimDocuments 

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

aws:
  s3:
    region: ap-south-1
    bucket: health-insurance-claim
    access-key: ${access_key}
    secret-key: ${secret_key}

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    hostname: localhost



